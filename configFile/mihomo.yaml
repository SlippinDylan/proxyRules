  jp: &jp_filter "(?i)^.*(?=.*(🇯🇵|日本|JP|Japan|Tokyo|Osaka|NTT|KDDI|SoftBank|IIJ|GMO|Sakura|BIGLOBE|OCN|Rakuten|BBiX|JPNE|ARTERIA))(?!.*(Traffic|Expire|🏠|家宽|家庭|住宅|home|🛰|家用|福利|新用户|邀请|网址|最新|流量|过期|剩余|套餐|更新|丢失|TG|频道|com|0\\.[1-9]|[2-9](\\.\\d+)?倍|[1-9]\\d倍|直接|直连)).*$"
  sj: &sj_filter "(?i)^.*(?=.*(🇸🇬|新加坡|狮城|Singapore|SG|Singtel|StarHub|M1|MyRepublic|ViewQwest|SuperInternet|Pacific Internet|Starhub))(?!.*(Traffic|Expire|🏠|家宽|家庭|住宅|home|🛰|家用|福利|新用户|邀请|网址|最新|流量|过期|剩余|套餐|更新|丢失|TG|频道|com|0\\.[1-9]|[2-9](\\.\\d+)?倍|[1-9]\\d倍|直接|直连)).*$"
  us: &us_filter "(?i)^.*(?=.*(🇺🇸|美国|USA|US|America|United States|Verizon|AT&T|Comcast|Charter|CenturyLink|Cox|Spectrum|Xfinity|T-Mobile|Sprint|Level3|Cogent|QuadraNet|Psychz|Vultr|DigitalOcean|Linode|OVH|Choopa))(?!.*(Traffic|Expire|🏠|家宽|家庭|住宅|home|🛰|家用|福利|新用户|邀请|网址|最新|流量|过期|剩余|套餐|更新|丢失|TG|频道|com|0\\.[1-9]|[2-9](\\.\\d+)?倍|[1-9]\\d倍|直接|直连)).*$"
  global: &global_filter "(?i)^((?!(Traffic|Expire|🇭🇰|香港|HK|Hong Kong|HongKong|HKBN|HKT|PCCW|3HK|SmarTone|CSL|中国移动香港|CMHK|和记|Hutchison|🇲🇴|澳门|澳門|MO|Macau|Macao|澳門電訊|澳讯|CTM|澳门电讯|MacauCTM|澳門寬頻|A1|CMT|澳门宽频|🇹🇼|台湾|TW|TWN|Taiwan|Taipei|HiNet|Taoyuan|Tainan|Taichung|中华电信|CHT|台湾大哥大|TWM|远传|FET|亚太电信|APT|台湾固网|TFN|So-net|🇯🇵|日本|JP|Japan|Tokyo|Osaka|NTT|KDDI|SoftBank|IIJ|GMO|Sakura|BIGLOBE|OCN|Rakuten|BBiX|JPNE|ARTERIA|🇸🇬|新加坡|狮城|Singapore|SG|Singtel|StarHub|M1|MyRepublic|ViewQwest|SuperInternet|Pacific Internet|Starhub|🇺🇸|美国|USA|US|America|United States|Verizon|AT&T|Comcast|Charter|CenturyLink|Cox|Spectrum|Xfinity|T-Mobile|Sprint|Level3|Cogent|QuadraNet|Psychz|Vultr|DigitalOcean|Linode|OVH|Choopa|🏠|家宽|家庭|住宅|home|🛰|家用|福利|新用户|邀请|网址|最新|流量|过期|剩余|套餐|更新|丢失|TG|频道|com|0\\.[1-9]|[2-9](\\.\\d+)?倍|[1-9]\\d倍|直接|直连)).)*$"
  home: &home_filter "(?i)^.*(?=.*(家宽|家庭|住宅|home|🏠|家用))(?!.*(Traffic|Expire|福利|新用户|邀请|网址|最新|流量|过期|剩余|套餐|更新|丢失|TG|频道|com|0\\.[1-9]|[2-9](\\.\\d+)?倍|[1-9]\\d倍|直接|直连)).*$"
  all: &all_filter "^((?!(Traffic|Expire|🏠|家宽|家庭|住宅|home|🛰|家用|福利|新用户|邀请|网址|最新|流量|过期|剩余|套餐|更新|丢失|TG|频道|com|0\\.[1-9]|[2-9](\\.\\d+)?倍|[1-9]\\d倍|直接|直连)).)*$"
policy-priorities:
  gmt: &gmt_priority "(?i)(🇭🇰|香港|HK|Hong Kong|HongKong|HKBN|HKT|PCCW|3HK|SmarTone|CSL|中国移动香港|CMHK|和记|Hutchison):1.5;(?i)(🇲🇴|澳门|澳門|MO|Macau|Macao|澳門電訊|澳讯|CTM|澳门电讯|MacauCTM|澳門寬頻|A1|CMT|澳门宽频):1.4;(?i)(🇯🇵|日本|JP|Japan|Tokyo|Osaka|NTT|KDDI|SoftBank|IIJ|GMO|Sakura|BIGLOBE|OCN|Rakuten|BBiX|JPNE|ARTERIA):1.3;(?i)(🇸🇬|新加坡|狮城|Singapore|SG|Singtel|StarHub|M1|MyRepublic|ViewQwest|SuperInternet|Pacific Internet|Starhub):1.2;(?i)(🇹🇼|台湾|TW|TWN|Taiwan|Taipei|HiNet|Taoyuan|Tainan|Taichung|中华电信|CHT|台湾大哥大|TWM|远传|FET|亚太电信|APT|台湾固网|TFN|So-net):1.1;"
# 出站策略锚点定义
proxymain: &proxymain {type: select, proxies: [🚀 代理主线, 🇭🇰 港澳台Smart, 🇯🇵 日本Smart, 🇸🇬 新加坡Smart, 🇺🇸 美国Smart, 🏠 家宽节点, 🌍 环球节点, 🛰 所有节点, 🔗 直连主线]}
directmain: &directmain {type: select, proxies: [🔗 直连主线, 🚀 代理主线, 🌍 环球节点, 🛰 所有节点]}
provider-main: &mainUse [wd-gold,]
provider-backup-pure: &backupUse [wd-gold, guar]
provider-all: &allUse [wd-gold, guar]

#
# 规则集锚点定义
rule-anchor:
  domain: &domain {type: http, interval: 21600, behavior: domain, format: mrs}
  class: &class {type: http, interval: 21600, behavior: classical, format: text}
  ip: &ip {type: http, interval: 21600, behavior: ipcidr, format: mrs}
# 机场订阅配置
proxy-providers:
  wd-gold:
    <<: *directProvider
    url: "订阅链接"
  guar:
    <<: *directProvider
    url: "订阅链接"

# 节点信息
proxies: [{name: "直接连接", type: direct, udp: true}]

# 全局端口和网络配置
log-level: info
mode: rule
ipv6: true
port: 7890
unified-delay: true
tcp-concurrent: true
bind-address: "*"
allow-lan: true

# 系统和性能配置 (删除了会报错的 global-client-fingerprint)
find-process-mode: 'off'
disable-keep-alive: false
keep-alive-interval: 15
keep-alive-idle: 600
profile: {store-selected: true, store-fake-ip: true, tracing: true, interval: 21600}

# 入站配置 (🔥核心恢复：原封不动保留你的双轨监听和 auto-route: true，这是你能上网的根基！)
tun: {enable: true, stack: mixed, dns-hijack: ["any:53", "tcp://any:53"], auto-route: true, auto-redirect: true, auto-detect-interface: true}
listeners: [{name: redir-in, type: redir, port: 7891, udp: false}, {name: tproxy-in, type: tproxy, port: 7892, udp: true}, {name: tun-in, type: tun, device: immortalwrt, stack: mixed, auto-route: false, auto-redirect: false, auto-detect-interface: false}]

# GeoX数据配置 (🔥核心恢复：强制设为 false，因为你原来 part3 没生效时就是 false，改成 true 你的规则会瘫痪)
geodata-mode: false
geodata-loader: standard
geox-url: {geosite: "https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat", geoip-mmdb: "https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.metadb", geoip-dat: "https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat", asn: "https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"}
geox-auto-update: true
geox-update-interval: 24

# 自动同步时间
ntp: {enable: true, write-to-system: false, server: "time.apple.com", port: 123, interval: 30}

# 嗅探配置
sniffer:
  enable: true
  # 端口嗅探设置
  sniff: {
    HTTP: {ports: [80, 8080-8880], override-destination: true},
    TLS: {ports: [443, 8443], override-destination: true},
    QUIC: {ports: [443, 8443], override-destination: true}
  }
  # 嗅探的rule-set如果引用的规则集是 list 的，且其中有 IP，则直接报错
  skip-domain: [
    "+.push.apple.com", "+.apple.com", "+.wechat.com",
    "+.ntp", "+.time", "keyword:ntp", "keyword:time",
    "+.wechatapp.com", "+.qpic.cn", 
    "+.oray.com", "+.sunlogin.net", "Mijia Cloud",
    "+.tsinghua.edu.cn","+.lan", "+.local",
  ]
  force-domain: [
    "+.v2ex.com", "+.vivox.com", "+.msftconnecttest.com", "+.msftncsi.com",
    "start.me", "+.start.me", 
    "rule-set:cn_domain,category_bank_cn,apple_cn_domain,onedrive_domain,microsoft_cn_domain,synology_domain,speedtest_domain",
    "rule-set:docker_ocd_domain,category_dev_domain,developer_ocd_domain,linux_domain,mine_develop",
    "rule-set:mine_proxy,google_gemini_domain,category_ai_chat_notcn_domain,microsoft_domain,youtube_domian,google_domain,telegram_domain,category_social_media_not_cn,category_communication,category_forums,spotify_domain,tiktok_domain,category_porn_domain,globalmedia_ocd_domain,category_media_domain,paypal_domain,proxy_domain,gfw_domain,geolocation_notcn_domain"
    ]

# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  respect-rules: true
  prefer-h3: false
  doh-priority-http3: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-cache: true
  fake-ip-filter-mode: blacklist
  cache-algorithm: arc
  fake-ip-filter: [
    "+.services.googleapis.cn", "+.xn--ngstr-lra8j.com", 
    "keyword:ntp", "keyword:time", "+.ntp", "+.time", 
    "+.yarnpkg.com", "+.ustclug.org", "mirrors.vsean.net", "+.vsean.net", 
    "+.lan", "+.local", "geosite:cn", "+.tailscale.com",
    "rule-set:cn_domain,private_domain,mine_torrent,category_bank_cn,apple_cn_domain,onedrive_domain,microsoft_cn_domain,synology_domain,speedtest_domain",
    "rule-set:docker_ocd_domain,category_dev_domain,developer_ocd_domain,linux_domain,mine_develop"
    ]
  default-nameserver: *defaultDNS
  proxy-server-nameserver: *proxyDNS
  direct-nameserver: *directDNS
  #是否遵循 nameserver-policy，默认为不遵守，仅当 direct-nameserver 不为空时生效
  direct-nameserver-follow-policy: false
  nameserver: *genericDNS
  nameserver-policy: {
      "rule-set:cn_domain,private_domain,mine_torrent,category_bank_cn,apple_cn_domain,onedrive_domain,microsoft_cn_domain,synology_domain,speedtest_domain": *genericDNS
    }

proxy-groups:
  # ===== 顶层：通道控制 =====
  - {name: 🚀 代理主线, type: select, proxies: [🇭🇰 港澳台Smart, 🇯🇵 日本Smart, 🇸🇬 新加坡Smart, 🇺🇸 美国Smart, 🧩 备份Smart, 🏠 家宽节点, 🌍 环球节点, 🛰 所有节点, 🔗 直连主线]}
  - {name: 🔗 直连主线, type: select, proxies: [直接连接]}
  # ===== 总服务策略（可绕过总阀）=====
  - {name: 🌐 国际代理, <<: *proxymain}
  - {name: 🐠 漏网之鱼, <<: *proxymain}

  # ===== 应用服务策略（可绕过总阀）=====
  - {name: 🍎 Apple, <<: *directmain}
  - {name: 🍎 ApplePxy, <<: *directmain}
  - {name: ☁️ MicrosoftCN, <<: *directmain}
  - {name: Ⓜ️ Microsoft, <<: *proxymain}
