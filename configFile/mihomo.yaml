  - {name: 🦑 Develop, <<: *proxymain}
  - {name: 🧠 Intelligence, <<: *proxymain}

  - {name: 🛩️ Telegram, <<: *proxymain}
  - {name: 📺 流媒体, <<: *proxymain}
  - {name: 🎵 Spotify, <<: *proxymain}
  - {name: 🎬 TikTok, <<: *proxymain}

  - {name: 💰 Wallet, <<: *proxymain}
  - {name: ⏱ Speedtest, <<: *directmain}

  # ===== 节点池 =====
  - {name: 🇭🇰 港澳台Smart, type: smart, use: *mainUse, first-test: true, interval: 60, uselightgbm: false, collectdata: false, policy-priority: *gmt_priority, filter: *gmt_filter}
  - {name: 🇯🇵 日本Smart, type: smart, use: *mainUse, first-test: true, interval: 60, uselightgbm: false, collectdata: false, filter: *jp_filter}
  - {name: 🇸🇬 新加坡Smart, type: smart, use: *mainUse, first-test: true, interval: 60, uselightgbm: false, collectdata: false, filter: *sj_filter}
  - {name: 🇺🇸 美国Smart, type: smart, use: *mainUse, first-test: true, interval: 60, uselightgbm: false, collectdata: false, filter: *us_filter}
  - {name: 🧩 备份Smart, type: smart, use: *backupUse, first-test: true, interval: 60, uselightgbm: false, collectdata: false, policy-priority: *gmt_priority, filter: *all_filter}
  - {name: 🏠 家宽节点, type: select, use: *allUse, first-test: true, interval: 60, filter: *home_filter}
  - {name: 🌍 环球节点, type: select, use: *allUse, first-test: true, interval: 60, filter: *global_filter}
  - {name: 🛰 所有节点, type: select, use: *allUse, first-test: true, interval: 60, filter: *all_filter}

