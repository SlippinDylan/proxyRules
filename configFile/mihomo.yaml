# 机场订阅模板锚点定义
direct-provider-template: &directProvider {type: http, interval: 3600, health-check: {enable: true, url: "https://www.gstatic.com/generate_204", interval: 180, lazy: false, tolerance: 10}, proxy: 🔗 直连主线, header: {User-Agent: ["Clash", "mihomo", "Clash.meta"]}, override: {udp: true, skip-cert-verify: true}}
proxy-provider-template: &proxyProvider {type: http, interval: 3600, health-check: {enable: true, url: "https://www.gstatic.com/generate_204", interval: 180, lazy: false, tolerance: 10}, proxy: 🚀 代理主线, header: {User-Agent: ["Clash", "mihomo", "Clash.meta"]}, override: {udp: true, skip-cert-verify: true}}
# DNS服务器配置锚点定义
dns-servers: 
  # 默认 DNS, 用于解析 DNS 服务器 的域名,必须为 IP, 可为加密 DNS
  default-nameserver: &defaultDNS [221.7.92.98, 221.5.203.98, "2408:8663::2", "2408:8662::2", 119.29.29.29, 223.5.5.5]
  # 代理节点域名解析服务器，仅用于解析代理节点的域名
  proxy-server-nameserver: &proxyDNS [223.5.5.5, 119.29.29.29, "[2400:3200::1]"]
  # 用于 direct 出口域名解析的 DNS 服务器，如果不填则遵循 nameserver-policy、nameserver
  direct-nameserver: &directDNS [221.7.92.98, 221.5.203.98, "2408:8663::2", "2408:8662::2", 223.5.5.5]
  # 默认的域名解析服务器，其他 dns 服务器都不行了用这个
  nameserver: &genericDNS [221.7.92.98, 221.5.203.98, "2408:8663::2", "2408:8662::2", 223.5.5.5]
  # 国外DNS服务器 - 用于国外域名解析，走代理
  # foreign-nameserver: &foreignDNS ["8.8.8.8#🚀 代理主线", "1.1.1.1#🚀 代理主线", "[2001:4860:4860::8888]#🚀 代理主线", "[2606:4700:4700::1111]#🚀 代理主线"]
